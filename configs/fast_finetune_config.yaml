# Fast fine-tuning for quick experimentation
model:
  checkpoint: "facebook/sam3-base"

lora:
  rank: 4
  alpha: 8
  dropout: 0.2
  target_modules:
    - "qkv"

data:
  train_dataset_path: "data/train"
  val_dataset_path: "data/val"
  image_size: 512
  num_samples: 100

training:
  epochs: 2
  batch_size: 2
  learning_rate: 2e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "linear"
  num_workers: 2