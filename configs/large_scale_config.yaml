# Large-scale LoRA training configuration
model:
  checkpoint: "facebook/sam3-base"

lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - "qkv"
    - "proj"
    - "mlp"

data:
  train_dataset_path: "data/large_train"
  val_dataset_path: "data/large_val"
  image_size: 1024
  num_samples: 50000

training:
  epochs: 20
  batch_size: 32
  learning_rate: 5e-5
  weight_decay: 0.001
  optimizer: "adamw"
  scheduler: "inverse_sqrt"
  warmup_steps: 10000
  num_workers: 8
  gradient_clip: 1.0