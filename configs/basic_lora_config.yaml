# Basic LoRA fine-tuning configuration
model:
  checkpoint: "facebook/sam3-base"

lora:
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - "qkv"
    - "proj"

data:
  train_dataset_path: "data/train"
  val_dataset_path: "data/val"
  image_size: 1008
  num_samples: 1000

training:
  epochs: 5
  batch_size: 4
  learning_rate: 1e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  num_workers: 2