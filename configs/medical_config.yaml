# Medical image segmentation configuration
model:
  checkpoint: "facebook/sam3-base"

lora:
  rank: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - "qkv"
    - "proj"
    - "mlp"

data:
  train_dataset_path: "data/medical_train"
  val_dataset_path: "data/medical_val"
  image_size: 512
  num_samples: 5000

training:
  epochs: 15
  batch_size: 8
  learning_rate: 1e-4
  weight_decay: 0.001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_steps: 500
  num_workers: 4