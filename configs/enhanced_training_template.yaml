# ============================================================================
# DATA CONFIGURATION with Enhanced Schema Support
# ============================================================================

data:
  train:
    annotation_file: "path/to/coco_train.json"
    # Optional: Split-aware loading
    # target_split: "train"
    # Optional: Class imbalance strategy
    # class_imbalance_strategy: "weighted_sampling"
  
  val:
    annotation_file: "path/to/coco_val.json"
    # target_split: "val"

# ============================================================================
# NOTES ON USING ENHANCED FEATURES
# ============================================================================

# 1. CLASS IMBALANCE HANDLING
#    - Set enabled: true to activate
#    - Choose strategy based on your imbalance ratio
#    - weight_power > 1.0 for more aggressive handling
#    - analyze_statistics: true to get detailed reports

# 2. PER-ITERATION VALIDATION
#    - Useful for monitoring convergence during long training runs
#    - Set frequency to 5-10% of total iterations
#    - Increase num_batches for more thorough validation (more time)
#    - Decrease num_batches for faster validation (less accurate)

# 3. VISUALIZATION
#    - Generates plots showing predictions vs ground truth
#    - Helps identify overfitting or failure modes
#    - Save to disk and review periodically
#    - Can be memory intensive - increase frequency if memory issues

# 4. ENHANCED LOGGING
#    - Aggregates per-iteration metrics instead of per-image
#    - Reduces tensorboard event file size
#    - class_wise_metrics helps identify problematic classes
#    - Improves logging readability

# ============================================================================
# TROUBLESHOOTING
# ============================================================================

# High memory usage:
#   - Reduce num_batches in per_iteration_validation
#   - Increase frequency in visualization to run less often
#   - Disable visualization if not needed

# Slow training:
#   - Increase frequency for all validation/visualization checks
#   - Reduce num_samples in visualization
#   - Disable class_wise_metrics if not needed

# Class imbalance not working:
#   - Check enabled: true in config
#   - Verify class weights are > 0
#   - Check that loss function supports weighting
#   - Run analysis to verify imbalance detection
