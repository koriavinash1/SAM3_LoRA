# Enhanced SAM3 Training Configuration Template
# 
# This template shows how to configure enhanced training with class imbalance handling,
# per-iteration validation, visualization, and improved logging.

# Original trainer configuration (add to your existing config)
trainer:
  # ... existing trainer configuration ...
  pass

# ============================================================================
# ENHANCED TRAINING CONFIGURATION
# ============================================================================

enhanced_training:
  
  # Class Imbalance Handling
  class_imbalance:
    enabled: true
    """Enable class imbalance handling"""
    
    strategy: "weighted_sampling"
    """Strategy for handling imbalance:
    - weighted_sampling: Weight sampling by inverse class frequency
    - focal_loss: Use focal loss (requires model support)
    - class_weighting: Apply class weights to loss
    """
    
    weight_power: 1.0
    """Power for computing weights (higher = stronger correction)"""
    
    analyze_statistics: true
    """Analyze and log class distribution statistics"""
  
  # Per-Iteration Validation Configuration
  per_iteration_validation:
    enabled: true
    """Enable validation checks during training"""
    
    frequency: 50
    """Run validation every N iterations"""
    
    num_batches: 5
    """Number of validation batches to use per validation run"""
    
    log_metrics: true
    """Log validation metrics to tensorboard"""
  
  # Visualization Configuration
  visualization:
    enabled: true
    """Enable visualization of predictions"""
    
    frequency: 100
    """Generate visualization every N iterations"""
    
    num_samples: 4
    """Number of samples to visualize per batch"""
    
    save_dir: "./logs/visualizations"
    """Directory to save visualization images"""
    
    overlay_alpha: 0.6
    """Alpha blending factor for mask overlay (0-1)"""
    
    draw_bboxes: true
    """Draw bounding boxes on visualization"""
    
    draw_centroids: true
    """Draw centroids on visualization"""
  
  # Enhanced Logging Configuration
  enhanced_logging:
    enabled: true
    """Enable enhanced logging with aggregation"""
    
    log_every_n_iterations: 50
    """Aggregate and log metrics every N iterations instead of per-image"""
    
    class_wise_metrics: true
    """Track and log metrics separately per class"""
    
    aggregation_strategy: "mean"
    """How to aggregate metrics: 'mean', 'median', 'sum'"""
  
  # Split-Aware Data Loading
  split_aware_loading: true
  """Enable split-aware data loading (train/val/test from image['split'])"""
  
  # Preserve Annotation Attributes
  preserve_attributes: true
  """Preserve annotation attributes and metadata from new COCO schema"""

